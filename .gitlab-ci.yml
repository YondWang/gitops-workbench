spec:
  inputs:
    operation:
      default: "manual_buttons"
      options:
        - "manual_buttons"
        - "version_init"
        - "feature_create"
        - "feature_merge"
        - "fix_create"
        - "bugfix_create"
        - "bugfix_merge"
        - "release_tag"
        - "release_stable"
        - "hotfix_create"
        - "hotfix_merge"
        - "branch_list"
        - "branch_compare"
        - "mr_list"
        - "tag_list"
        - "sync_check"
        - "version_status"
      description: "兼容旧入口；按钮式流水线中可保持 manual_buttons"
    target_project:
      default: "software_hmi_app/business"
      description: "被管理的业务项目路径"
    version:
      default: "3.2.0.0"
      description: "版本号 A.B.C.D"
    from_ref:
      default: ""
      description: "创建来源 ref；初始化版本留空默认 fix，hotfix 留空默认 main"
    task_id:
      default: "TASK1234"
      description: "功能任务编号"
    bug_id:
      default: "BUG001"
      description: "Bug 编号"
    description:
      default: "short-desc"
      description: "英文短描述，用于分支名"
    feature_branch:
      default: ""
      description: "功能分支名；留空时按 version/task_id/description 自动推导"
    bugfix_branch:
      default: ""
      description: "Bugfix 分支名；留空时按 version/bug_id/description 自动推导"
    fix_branch:
      default: ""
      description: "Fix/RC 分支名；留空时自动选择当前版本最新 RC"
    hotfix_branch:
      default: ""
      description: "Hotfix 分支名；留空时按 current_version/bug_id/description 自动推导"
    rc_number:
      default: ""
      description: "RC 编号；留空时自动递增"
    tag_name:
      default: ""
      description: "Tag 名；留空时自动推导"
    from_tag:
      default: ""
      description: "创建 stable 分支时的来源 tag；留空时按 v{version} 推导"
    current_version:
      default: "3.2.0.0"
      description: "Hotfix 当前线上版本号"
    merge_to_main:
      default: "false"
      options: ["false", "true"]
      description: "release_tag 后是否创建 fix -> main MR"
    auto_sync:
      default: "true"
      options: ["true", "false"]
      description: "bugfix 合并后是否同步到 baseline"
    sync_to_baseline:
      default: ""
      description: "hotfix 同步目标 baseline 版本；留空则不自动同步"
    pattern:
      default: ""
      description: "分支/tag 查询过滤条件"
    from_branch:
      default: "fix/3.2.0.0-rc1"
      description: "比较来源分支"
    to_branch:
      default: "baseline/3.2.0.0"
      description: "比较目标分支"
    state:
      default: "opened"
      options: ["opened", "merged", "closed", "all"]
      description: "MR 状态"
    target_branch:
      default: ""
      description: "MR 目标分支过滤"
---
image: docker.m.daocloud.io/curlimages/curl:latest

stages:
  - operate

variables:
  GITLAB_API_URL: "https://www.chancee-shanghai.cn:9900/api/v4"
  OPERATION: "$[[ inputs.operation ]]"
  TARGET_PROJECT: "$[[ inputs.target_project ]]"
  VERSION: "$[[ inputs.version ]]"
  FROM_REF: "$[[ inputs.from_ref ]]"
  TASK_ID: "$[[ inputs.task_id ]]"
  BUG_ID: "$[[ inputs.bug_id ]]"
  DESCRIPTION: "$[[ inputs.description ]]"
  FEATURE_BRANCH: "$[[ inputs.feature_branch ]]"
  BUGFIX_BRANCH: "$[[ inputs.bugfix_branch ]]"
  FIX_BRANCH: "$[[ inputs.fix_branch ]]"
  HOTFIX_BRANCH: "$[[ inputs.hotfix_branch ]]"
  RC_NUMBER: "$[[ inputs.rc_number ]]"
  TAG_NAME: "$[[ inputs.tag_name ]]"
  FROM_TAG: "$[[ inputs.from_tag ]]"
  CURRENT_VERSION: "$[[ inputs.current_version ]]"
  MERGE_TO_MAIN: "$[[ inputs.merge_to_main ]]"
  AUTO_SYNC: "$[[ inputs.auto_sync ]]"
  SYNC_TO_BASELINE: "$[[ inputs.sync_to_baseline ]]"
  PATTERN: "$[[ inputs.pattern ]]"
  FROM_BRANCH: "$[[ inputs.from_branch ]]"
  TO_BRANCH: "$[[ inputs.to_branch ]]"
  STATE: "$[[ inputs.state ]]"
  TARGET_BRANCH_FILTER: "$[[ inputs.target_branch ]]"

.gitops_base:
  stage: operate
  when: manual
  allow_failure: false
  before_script:
    - set -eu
    - . .gitlab/scripts/git-utils.sh
    - check_token
    - init_project

include:
  - local: ".gitlab/ci/version-init.yml"
  - local: ".gitlab/ci/feature-create.yml"
  - local: ".gitlab/ci/feature-merge.yml"
  - local: ".gitlab/ci/fix-create.yml"
  - local: ".gitlab/ci/bugfix-create.yml"
  - local: ".gitlab/ci/bugfix-merge.yml"
  - local: ".gitlab/ci/release-tag.yml"
  - local: ".gitlab/ci/release-stable.yml"
  - local: ".gitlab/ci/hotfix-create.yml"
  - local: ".gitlab/ci/hotfix-merge.yml"
  - local: ".gitlab/ci/branch-list.yml"
  - local: ".gitlab/ci/branch-compare.yml"
  - local: ".gitlab/ci/mr-list.yml"
  - local: ".gitlab/ci/tag-list.yml"
  - local: ".gitlab/ci/sync-check.yml"
  - local: ".gitlab/ci/version-status.yml"
