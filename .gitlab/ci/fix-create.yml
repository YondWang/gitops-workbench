fix_create:
  extends: .gitops_base
  stage: branch
  rules:
    - if: '$OPERATION == "fix_create"'
  script:
    - require_version "$VERSION"
    - rc="${RC_NUMBER:-$(next_rc_number "$VERSION")}"
    - branch="fix/${VERSION}-rc${rc}"
    - branch_create "$branch" "baseline/${VERSION}"
    - branch_protect "$branch" 0 40
    - ok "fix branch ready for testing: ${branch}"
    - log "recommended tag later: v${VERSION}-rc${rc}"

