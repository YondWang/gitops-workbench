bugfix_merge:
  extends: .gitops_base
  stage: merge
  rules:
    - if: '$OPERATION == "bugfix_merge"'
  script:
    - version="$(get_version_from_bugfix "$BUGFIX_BRANCH")"
    - fix_target="$(get_fix_from_bugfix "$BUGFIX_BRANCH")"
    - baseline="baseline/${version}"
    - if [ -z "$fix_target" ]; then err "cannot infer fix branch for ${BUGFIX_BRANCH}. Set/fix existing fix/${version}-rcN first."; exit 2; fi
    - create_mr "$BUGFIX_BRANCH" "$fix_target" "[${version}][bugfix] merge ${BUGFIX_BRANCH}"
    - if [ "$AUTO_SYNC" = "true" ]; then cherry_pick_commits "$BUGFIX_BRANCH" "$baseline"; else warn "auto_sync disabled; remember to sync ${BUGFIX_BRANCH} to ${baseline}"; fi

