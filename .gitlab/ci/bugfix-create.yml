button_bugfix_create:
  extends: .gitops_base
  variables:
    OPERATION: "bugfix_create"
  script:
    - |
      require_version "$VERSION"
      rc="${RC_NUMBER:-1}"
      branch="$(derive_bugfix_branch)"
      branch_create "$branch" "fix/${VERSION}-rc${rc}"
      ok "bugfix branch ready: ${branch}"
