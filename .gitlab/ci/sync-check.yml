sync_check:
  extends: .gitops_base
  stage: sync
  rules:
    - if: '$OPERATION == "sync_check"'
  script:
    - version="$(printf '%s' "$FIX_BRANCH" | sed -E 's#^fix/([^/]+)-rc[0-9]+$#\1#')"
    - baseline="baseline/${version}"
    - log "checking unsynced commits from ${baseline} to ${FIX_BRANCH}"
    - list_compare_commit_ids "$baseline" "$FIX_BRANCH" || true
    - ok "sync check completed"

