services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/python:3.12-slim}
    image: gitops-workbench:latest
    container_name: gitops-workbench
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GITOPS_HOST: 0.0.0.0
      GITOPS_PORT: 9910
      GITOPS_TLS_CERT: ${GITOPS_TLS_CERT:-/etc/gitlab/ssl/chancee-shanghai.cn-crt.pem}
      GITOPS_TLS_KEY: ${GITOPS_TLS_KEY:-/etc/gitlab/ssl/chancee-shanghai.cn-key.pem}
      SIMOS_CI_ARTIFACT_ROOT: ${SIMOS_CI_ARTIFACT_ROOT:-/data/simos-ci/artifacts}
    extra_hosts:
      - "www.chancee-shanghai.cn:${GITLAB_HOST_IP:-192.168.110.222}"
    volumes:
      - /data/gitops-workbench/data:/app/data
      - /data/simos-ci:/data/simos-ci:ro
      - /etc/gitlab/ssl:/etc/gitlab/ssl:ro
    ports:
      - "9910:9910"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import ssl, urllib.request; urllib.request.urlopen('https://127.0.0.1:9910/api/session', timeout=5, context=ssl._create_unverified_context()).read()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
